services:
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    image: le-backend:dev
    container_name: le-backend
    env_file:
      - .env
    environment:
      ENV: ${ENV:-development}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 10s
